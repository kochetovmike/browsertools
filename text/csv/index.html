<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="base-href" content="../../">
  <title>CSV / JSON / Table — OneTabTools</title>
  <link rel="icon" type="image/svg+xml" href="../../src/favicon.svg">
  <link rel="stylesheet" href="../../style.css">
</head>
<body data-page="text-csv">

<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <div class="page-wrap">
    <div class="topbar">
      <button class="hamburger" id="hamburger" aria-label="Open navigation">&#9776;</button>
      <span class="topbar-title">CSV / JSON / Table</span>
    </div>
    <main>
      <div class="controls">
        <select class="fmt" id="csv-from">
          <option value="csv">CSV</option>
          <option value="json">JSON Array</option>
          <option value="md">Markdown Table</option>
        </select>
        <span class="arrow">→</span>
        <select class="fmt" id="csv-to">
          <option value="json">JSON Array</option>
          <option value="csv">CSV</option>
          <option value="md">Markdown Table</option>
        </select>
        <button id="csv-convert-btn">Convert</button>
        <button class="ghost" id="csv-swap-btn">⇄ Swap</button>
      </div>
      <div class="panels">
        <div class="panel">
          <div class="panel-head">Input <button class="mini" id="csv-in-copy">Copy</button></div>
          <textarea id="csv-in" placeholder="name,age,city&#10;Alice,30,London&#10;Bob,25,Paris"></textarea>
        </div>
        <div class="panel">
          <div class="panel-head">Output <button class="mini" id="csv-copy">Copy</button></div>
          <textarea id="csv-out" readonly></textarea>
        </div>
      </div>
      <div class="err" id="csv-err"></div>
    </main>
    <footer>OneTabTools by Mikhail Kochetov &nbsp;·&nbsp; All processing is done locally in your browser.</footer>
  </div>
</div>

<script src="../../src/nav.js"></script>
<script>
function showErr(id, msg) { const el = document.getElementById(id); el.textContent = msg; el.classList.add('on'); }
function hideErr(id) { const el = document.getElementById(id); el.textContent = ''; el.classList.remove('on'); }
function copyBtn(btnId, taId) {
  document.getElementById(btnId).addEventListener('click', () => {
    const ta = document.getElementById(taId);
    if (!ta || !ta.value) return;
    navigator.clipboard.writeText(ta.value).then(() => {
      const btn = document.getElementById(btnId);
      const orig = btn.textContent; btn.textContent = 'Copied!'; btn.classList.add('ok');
      setTimeout(() => { btn.textContent = orig; btn.classList.remove('ok'); }, 1500);
    });
  });
}

function parseCSVRow(row) {
  const res = [];
  let cur = '', inQ = false;
  for (let i = 0; i < row.length; i++) {
    const c = row[i];
    if (c === '"' && !inQ) { inQ = true; }
    else if (c === '"' && inQ) { if (row[i+1]==='"') { cur+='"'; i++; } else inQ=false; }
    else if (c === ',' && !inQ) { res.push(cur); cur=''; }
    else cur += c;
  }
  res.push(cur);
  return res.map(v => v.trim());
}
function parseCSV(text) {
  const lines = text.trim().split('\n').filter(l => l.trim());
  if (!lines.length) throw new Error('Empty input');
  const headers = parseCSVRow(lines[0]);
  return lines.slice(1).filter(l => l.trim()).map(line => {
    const vals = parseCSVRow(line);
    const obj = {};
    headers.forEach((h, i) => obj[h] = vals[i] ?? '');
    return obj;
  });
}
function toCSV(rows) {
  if (!rows.length) return '';
  const headers = Object.keys(rows[0]);
  const esc = v => {
    const s = String(v ?? '');
    return (s.includes(',') || s.includes('"') || s.includes('\n'))
      ? `"${s.replace(/"/g,'""')}"` : s;
  };
  return [headers.join(','), ...rows.map(r => headers.map(h => esc(r[h])).join(','))].join('\n');
}
function toMDTable(rows) {
  if (!rows.length) return '';
  const headers = Object.keys(rows[0]);
  return [
    '| ' + headers.join(' | ') + ' |',
    '| ' + headers.map(() => '---').join(' | ') + ' |',
    ...rows.map(r => '| ' + headers.map(h => String(r[h]??'').replace(/\|/g,'\\|')).join(' | ') + ' |')
  ].join('\n');
}
function parseMDTable(text) {
  const lines = text.trim().split('\n').filter(l => l.trim().startsWith('|'));
  if (lines.length < 3) throw new Error('Expected at least 3 rows (header, separator, data)');
  const row = l => l.replace(/^\||\|$/g,'').split('|').map(c => c.trim());
  const headers = row(lines[0]);
  return lines.slice(2).map(l => {
    const vals = row(l);
    const obj = {};
    headers.forEach((h, i) => obj[h] = vals[i] ?? '');
    return obj;
  });
}

document.getElementById('csv-convert-btn').addEventListener('click', () => {
  hideErr('csv-err');
  const from = document.getElementById('csv-from').value;
  const to   = document.getElementById('csv-to').value;
  const txt  = document.getElementById('csv-in').value.trim();
  if (!txt) return;
  try {
    let rows;
    if (from === 'csv')  rows = parseCSV(txt);
    else if (from === 'json') { rows = JSON.parse(txt); if (!Array.isArray(rows)) throw new Error('Expected a JSON array of objects'); }
    else if (from === 'md')  rows = parseMDTable(txt);

    let out;
    if (to === 'csv')       out = toCSV(rows);
    else if (to === 'json') out = JSON.stringify(rows, null, 2);
    else if (to === 'md')   out = toMDTable(rows);

    document.getElementById('csv-out').value = out;
  } catch (e) { showErr('csv-err', e.message); }
});

document.getElementById('csv-swap-btn').addEventListener('click', () => {
  const f = document.getElementById('csv-from');
  const t = document.getElementById('csv-to');
  const i = document.getElementById('csv-in');
  const o = document.getElementById('csv-out');
  [f.value, t.value] = [t.value, f.value];
  if (o.value) { i.value = o.value; o.value = ''; }
});

document.getElementById('csv-in').addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') document.getElementById('csv-convert-btn').click();
});

copyBtn('csv-copy', 'csv-out');
copyBtn('csv-in-copy', 'csv-in');
</script>

</body>
</html>
